name: Build & Release Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'electron-app/src/**'
      - 'electron-app/assets/**'
      - 'electron-app/electron-builder.yml'
      - 'electron-app/scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        id: version
        working-directory: electron-app
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $parts = $pkg.version.Split('.')
          $parts[2] = [string]([int]$parts[2] + 1)
          $newVer = $parts -join '.'
          $pkg.version = $newVer
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding utf8NoBOM
          "version=$newVer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Versão: $newVer"

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'false'

      - name: Build Windows installer
        working-directory: electron-app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add electron-app/package.json
          git commit -m "chore: bump desktop para v${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Clica Aí Desktop v${{ steps.version.outputs.version }}"
          body: |
            Release automático gerado a partir do commit `${{ github.sha }}`.

            ### Como instalar
            1. Baixe o arquivo `.exe` abaixo
            2. Execute o instalador e siga as instruções
            3. O app se atualiza automaticamente nas próximas versões
          files: |
            electron-app/dist/*.exe
            electron-app/dist/latest.yml
          make_latest: true
