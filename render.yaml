services:
  - type: web
    name: claudezap-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MSG_DELAY_MS
        value: "3000"
      - key: MSG_RATE_LIMIT_PER_MIN
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      # Configurar manualmente no painel do Render após criar os serviços:
      # DATABASE_URL  → connection string do Neon/PostgreSQL
      # CORS_ORIGIN   → URL do seu frontend no Vercel (ex: https://claudezap.vercel.app)
      # RESEND_API_KEY → chave da API do Resend para envio de emails
      # API_URL       → URL deste serviço no Render (ex: https://claudezap-api.onrender.com)
