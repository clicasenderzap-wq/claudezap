<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#059652"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#16a34a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="184" height="184" rx="44" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Inner light overlay top -->
  <rect x="8" y="8" width="184" height="90" rx="44" fill="white" opacity="0.07"/>

  <!-- Cursor arrow -->
  <path d="M52 50 L52 118 L72 98 L86 132 L100 126 L86 92 L110 92 Z" fill="white" opacity="0.96"/>

  <!-- Notification dot -->
  <circle cx="132" cy="62" r="18" fill="url(#dot)" opacity="0.85"/>
  <circle cx="132" cy="62" r="10" fill="white"/>
</svg>
