<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#059652"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Icon 120x120 — mesma proporção do logo-icon.svg, scale=0.6 -->
  <g transform="translate(0,10) scale(0.6)">
    <rect x="8" y="8" width="184" height="184" rx="44" fill="url(#iconGrad)"/>
    <rect x="8" y="8" width="184" height="90" rx="44" fill="white" opacity="0.06"/>
    <path d="M52 50 L52 118 L72 98 L86 132 L100 126 L86 92 L110 92 Z" fill="white" opacity="0.95"/>
    <circle cx="132" cy="62" r="18" fill="url(#dotGrad)" opacity="0.85"/>
    <circle cx="132" cy="62" r="10" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="136" y="72" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="900" font-size="54" fill="#111827" letter-spacing="-1">Clica <tspan fill="#16a34a">Aí</tspan></text>

  <!-- Tagline -->
  <text x="136" y="100" font-family="Arial,sans-serif" font-weight="400" font-size="17" fill="#6b7280" letter-spacing="0.3">Automação Inteligente de mensagens</text>
</svg>
