<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#059652"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="5" width="120" height="120" rx="28" fill="url(#iconGrad)"/>

  <!-- Cursor arrow (white) -->
  <path d="M32 30 L32 78 L46 64 L55 86 L64 82 L55 60 L72 60 Z" fill="white" opacity="0.95"/>

  <!-- Message dot accent -->
  <circle cx="82" cy="38" r="9" fill="url(#dotGrad)" opacity="0.9"/>
  <circle cx="82" cy="38" r="5" fill="white"/>

  <!-- Wordmark: Clica -->
  <text x="138" y="70" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-weight="900" font-size="52" fill="#111827" letter-spacing="-1">Clica</text>

  <!-- Wordmark: Aí -->
  <text x="305" y="70" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-weight="900" font-size="52" fill="#16a34a" letter-spacing="-1"> Aí</text>

  <!-- Tagline -->
  <text x="138" y="96" font-family="Arial, sans-serif" font-weight="400" font-size="17" fill="#6b7280" letter-spacing="0.3">Automação de mensagens inteligente</text>
</svg>
