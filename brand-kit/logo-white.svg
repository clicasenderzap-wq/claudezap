<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <!-- For use on dark/green backgrounds -->
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
  </defs>

  <!-- Icon background (glass) -->
  <rect x="0" y="5" width="120" height="120" rx="28" fill="url(#iconBg)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Cursor -->
  <path d="M32 30 L32 78 L46 64 L55 86 L64 82 L55 60 L72 60 Z" fill="white" opacity="0.95"/>

  <!-- Dot -->
  <circle cx="82" cy="38" r="9" fill="rgba(255,255,255,0.35)"/>
  <circle cx="82" cy="38" r="5" fill="white"/>

  <!-- Wordmark white -->
  <text x="138" y="70" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="-1">Clica</text>
  <text x="305" y="70" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-weight="900" font-size="52" fill="rgba(255,255,255,0.8)" letter-spacing="-1"> Aí</text>

  <!-- Tagline -->
  <text x="138" y="96" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.6)" letter-spacing="0.3">Automação de mensagens inteligente</text>
</svg>
