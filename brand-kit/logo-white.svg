<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <!-- For use on dark/green backgrounds -->
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
  </defs>

  <!-- Icon 120x120 — same proportions as logo-icon.svg, scale=0.6, glass style for dark/green bg -->
  <g transform="translate(0,10) scale(0.6)">
    <rect x="8" y="8" width="184" height="184" rx="44" fill="url(#iconBg)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <path d="M52 50 L52 118 L72 98 L86 132 L100 126 L86 92 L110 92 Z" fill="white" opacity="0.95"/>
    <circle cx="132" cy="62" r="18" fill="rgba(255,255,255,0.4)"/>
    <circle cx="132" cy="62" r="10" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="136" y="72" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="900" font-size="54" fill="white" letter-spacing="-1">Clica <tspan fill="rgba(255,255,255,0.8)">Aí</tspan></text>

  <!-- Tagline -->
  <text x="136" y="100" font-family="Arial,sans-serif" font-weight="400" font-size="17" fill="rgba(255,255,255,0.6)" letter-spacing="0.3">Automação Inteligente de mensagens</text>
</svg>
