appId: br.com.clicaai.claudezap
productName: Clica Aí
copyright: Copyright © 2026 ClicaAI

publish:
  provider: github
  owner: clicasenderzap-wq
  repo: claudezap
  releaseType: release

directories:
  output: dist
  buildResources: assets

extraResources:
  - from: chrome-dist/
    to: chrome
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  installerHeaderIcon: assets/icon.ico

files:
  - src/**/*
  - assets/**/*
  - "!**/*.map"
  - "!node_modules/puppeteer/.local-chromium/**"
  - "!node_modules/.cache/**"
